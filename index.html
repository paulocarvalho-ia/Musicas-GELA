<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Músicas para Ambientação · Mocidade Ranulfo Xavier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2620;
    --paper:#faf6ee;
    --paper-soft:#f3ecdd;

    /* tema LENTA — noite de bruma */
    --lenta-deep:#232c42;
    --lenta-mid:#4f5f82;
    --lenta-mist:#aab7cf;
    --lenta-glow:#f2e9d6;
    --lenta-accent:#8fa3c9;

    /* tema AGITADA — alvorada */
    --agit-deep:#3b2a3d;
    --agit-mid:#c17b4a;
    --agit-mist:#e9b878;
    --agit-glow:#fbe6bf;
    --agit-accent:#e08a4f;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Jost', sans-serif;
    color:var(--ink);
    background:#1b1a22;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:500;
    letter-spacing:0.01em;
  }
  button{font-family:inherit; cursor:pointer;}
  a{color:inherit;}

  .screen{
    position:fixed; inset:0;
    display:none;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .screen.active{display:block;}

  .bgsvg{
    position:absolute; inset:0;
    width:100%; height:100%;
    z-index:0;
  }
  .bgsvg svg{width:100%; height:100%; display:block;}

  .content{
    position:relative; z-index:1;
    min-height:100%;
    display:flex; flex-direction:column;
  }

  /* ---------- HOME ---------- */
  #home .content{
    align-items:center; justify-content:center;
    padding:8vh 6vw 6vh;
    text-align:center;
    gap:6vh;
  }
  .eyebrow{
    font-size:0.78rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--paper-soft);
    opacity:0.85;
  }
  .home-title{
    color:var(--paper);
    font-size:clamp(2.1rem, 5.4vw, 3.6rem);
    line-height:1.08;
    margin-top:0.6rem;
  }
  .home-sub{
    color:var(--paper-soft);
    opacity:0.8;
    font-size:1rem;
    margin-top:0.9rem;
    font-weight:400;
  }
  .choice-row{
    display:flex;
    gap:clamp(1rem,3vw,2rem);
    width:100%;
    max-width:920px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .choice-card{
    flex:1 1 320px;
    max-width:420px;
    min-height:230px;
    border-radius:22px;
    border:1px solid rgba(250,246,238,0.22);
    background:rgba(20,20,28,0.28);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    padding:2.1rem 1.8rem;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:0.9rem;
    color:var(--paper);
    transition:transform .35s ease, background .35s ease, border-color .35s ease;
  }
  .choice-card:hover, .choice-card:focus-visible{
    transform:translateY(-4px);
    background:rgba(20,20,28,0.4);
    border-color:rgba(250,246,238,0.4);
    outline:none;
  }
  .choice-icon{width:64px; height:64px;}
  .choice-name{font-size:1.5rem;}
  .choice-count{
    font-size:0.82rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    opacity:0.75;
  }
  .choice-card.lenta .choice-name{color:var(--lenta-glow);}
  .choice-card.agitada .choice-name{color:var(--agit-glow);}

  .footer-credit{
    color:var(--paper-soft);
    opacity:0.55;
    font-size:0.75rem;
    letter-spacing:0.04em;
  }

  /* ---------- LIST ---------- */
  .list-header{
    position:sticky; top:0; z-index:2;
    display:flex; align-items:center; gap:0.9rem;
    padding:1.3rem 5vw 1.1rem;
    background:linear-gradient(to bottom, rgba(20,18,24,0.78), rgba(20,18,24,0));
  }
  .icon-btn{
    width:42px; height:42px; flex:0 0 auto;
    border-radius:50%;
    border:1px solid rgba(250,246,238,0.3);
    background:rgba(255,255,255,0.06);
    color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-size:1.1rem;
  }
  .icon-btn:hover{background:rgba(255,255,255,0.14);}
  .list-title-wrap{flex:1;}
  .list-title{color:var(--paper); font-size:1.5rem;}
  .list-count{color:var(--paper-soft); opacity:0.7; font-size:0.8rem;}

  .filter-wrap{padding:0 5vw 0.6rem;}
  .filter-input{
    width:100%;
    padding:0.7rem 1rem;
    border-radius:12px;
    border:1px solid rgba(250,246,238,0.25);
    background:rgba(255,255,255,0.07);
    color:var(--paper);
    font-family:'Jost',sans-serif;
    font-size:0.95rem;
  }
  .filter-input::placeholder{color:rgba(250,246,238,0.55);}
  .filter-input:focus{outline:none; border-color:rgba(250,246,238,0.55);}

  .song-list{
    padding:0.6rem 5vw 5vh;
    display:flex; flex-direction:column; gap:0.6rem;
    max-width:760px;
    margin:0 auto;
    width:100%;
  }
  .song-item{
    display:flex; align-items:center; justify-content:space-between; gap:1rem;
    padding:1rem 1.2rem;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(250,246,238,0.14);
    color:var(--paper);
    text-align:left;
    transition:background .2s ease, border-color .2s ease, transform .2s ease;
  }
  .song-item:hover, .song-item:focus-visible{
    background:rgba(255,255,255,0.13);
    border-color:rgba(250,246,238,0.3);
    transform:translateX(3px);
    outline:none;
  }
  .song-item-title{font-family:'Fraunces',serif; font-size:1.08rem;}
  .song-item-author{
    font-size:0.8rem;
    opacity:0.65;
    margin-top:0.15rem;
  }
  .song-item-arrow{opacity:0.5; font-size:1.1rem; flex:0 0 auto;}
  .empty-note{
    color:var(--paper-soft); opacity:0.6;
    padding:2rem 0; text-align:center; font-size:0.9rem;
  }

  /* ---------- SONG ---------- */
  #song .content{
    align-items:center; justify-content:center;
    text-align:center;
    padding:6vh 8vw;
    gap:1.4rem;
    min-height:100%;
  }
  .song-topbar{
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:1.2rem 5vw;
    z-index:2;
  }
  .song-position{
    color:var(--paper-soft); opacity:0.7;
    font-size:0.78rem; letter-spacing:0.06em;
  }
  .song-author-tag{
    color:var(--paper-soft);
    opacity:0.75;
    font-size:0.85rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
  }
  .song-title{
    color:var(--paper);
    font-size:clamp(2.4rem, 7vw, 5rem);
    line-height:1.06;
    max-width:16ch;
    text-shadow:0 2px 30px rgba(0,0,0,0.25);
  }
  .song-divider{
    width:52px; height:2px;
    background:rgba(250,246,238,0.5);
    margin:0.4rem 0;
  }
  .song-nav{
    position:absolute; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:1rem;
    padding:0 5vw 4vh;
    z-index:2;
  }
  .nav-btn{
    padding:0.65rem 1.3rem;
    border-radius:999px;
    border:1px solid rgba(250,246,238,0.3);
    background:rgba(255,255,255,0.07);
    color:var(--paper);
    font-size:0.85rem;
    display:flex; align-items:center; gap:0.4rem;
  }
  .nav-btn:hover{background:rgba(255,255,255,0.16);}
  .nav-btn:disabled{opacity:0.25; pointer-events:none;}

  @media (max-width:560px){
    .choice-row{flex-direction:column; align-items:center;}
    .choice-card{width:100%;}
    .song-nav{gap:0.6rem;}
    .nav-btn span.label{display:none;}
  }

  @media (prefers-reduced-motion: reduce){
    * {animation:none !important; transition:none !important;}
  }

  .twinkle{animation:tw 3.6s ease-in-out infinite;}
  .twinkle:nth-child(2){animation-delay:0.6s;}
  .twinkle:nth-child(3){animation-delay:1.4s;}
  .twinkle:nth-child(4){animation-delay:2.1s;}
  @keyframes tw{
    0%,100%{opacity:0.25;}
    50%{opacity:0.95;}
  }
  .drift{animation:drift 34s linear infinite;}
  @keyframes drift{
    0%{transform:translateX(-4%);}
    50%{transform:translateX(3%);}
    100%{transform:translateX(-4%);}
  }
  .pulse-sun{animation:pulseSun 6s ease-in-out infinite;}
  @keyframes pulseSun{
    0%,100%{opacity:0.9;}
    50%{opacity:1;}
  }
</style>
</head>
<body>

<!-- ============ HOME ============ -->
<section id="home" class="screen">
  <div class="bgsvg" id="bg-home"></div>
  <div class="content">
    <div>
      <div class="eyebrow">GELA · Mocidade Ranulfo Xavier</div>
      <h1 class="home-title">Músicas para<br>Ambientação</h1>
      <p class="home-sub">Escolha o clima do momento para ver as opções</p>
    </div>
    <div class="choice-row">
      <button class="choice-card lenta" data-cat="lenta">
        <svg class="choice-icon" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="26" r="12" fill="var(--lenta-glow)" opacity="0.9"/>
          <circle cx="27" cy="22" r="12" fill="#232c42"/>
          <circle cx="14" cy="10" r="1.3" fill="var(--lenta-glow)"/>
          <circle cx="48" cy="14" r="1" fill="var(--lenta-glow)"/>
          <circle cx="52" cy="30" r="1.2" fill="var(--lenta-glow)"/>
          <path d="M4 52 Q18 38 32 50 Q46 40 60 52 V60 H4 Z" fill="var(--lenta-mid)"/>
        </svg>
        <div class="choice-name">Mais lentas</div>
        <div class="choice-count" id="count-lenta">— músicas</div>
      </button>
      <button class="choice-card agitada" data-cat="agitada">
        <svg class="choice-icon" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="24" r="11" fill="var(--agit-mist)"/>
          <g stroke="var(--agit-glow)" stroke-width="2" stroke-linecap="round">
            <line x1="32" y1="4" x2="32" y2="9"/>
            <line x1="14" y1="12" x2="17.5" y2="15.5"/>
            <line x1="50" y1="12" x2="46.5" y2="15.5"/>
          </g>
          <path d="M2 52 Q16 34 32 48 Q48 34 62 52 V60 H2 Z" fill="var(--agit-mid)"/>
        </svg>
        <div class="choice-name">Mais agitadas</div>
        <div class="choice-count" id="count-agitada">— músicas</div>
      </button>
    </div>
    <div class="footer-credit">toque para continuar</div>
  </div>
</section>

<!-- ============ LIST ============ -->
<section id="list" class="screen">
  <div class="bgsvg" id="bg-list"></div>
  <div class="content">
    <div class="list-header">
      <button class="icon-btn" id="list-back" aria-label="Voltar ao início">←</button>
      <div class="list-title-wrap">
        <div class="list-title" id="list-title">—</div>
        <div class="list-count" id="list-count">—</div>
      </div>
    </div>
    <div class="filter-wrap">
      <input class="filter-input" id="filter-input" type="text" placeholder="Filtrar por título ou autor…">
    </div>
    <div class="song-list" id="song-list"></div>
  </div>
</section>

<!-- ============ SONG ============ -->
<section id="song" class="screen">
  <div class="bgsvg" id="bg-song"></div>
  <div class="content">
    <div class="song-topbar">
      <button class="icon-btn" id="song-back" aria-label="Voltar à lista">←</button>
      <div class="song-position" id="song-position">—</div>
    </div>
    <div class="song-author-tag" id="song-author">—</div>
    <div class="song-divider"></div>
    <h2 class="song-title" id="song-title">—</h2>
    <div class="song-nav">
      <button class="nav-btn" id="song-prev">‹ <span class="label">Anterior</span></button>
      <button class="nav-btn" id="song-home">Início</button>
      <button class="nav-btn" id="song-next"><span class="label">Próxima</span> ›</button>
    </div>
  </div>
</section>

<script>
/* ================= DADOS ================= */
const DATA = {
  lenta: [
    {t:"Além do Véu", a:"Carol Badon & Rafael Concellos"},
    {t:"Amigo", a:"José Carlos Guimarães"},
    {t:"Amizade", a:"Marielza Tiscate"},
    {t:"Aos Pés do Monte", a:"Tim e Vanessa"},
    {t:"As Bem-Aventuranças", a:"Tim e Vanessa"},
    {t:"A Voz e a Canção", a:"Eduardo Barreto"},
    {t:"Brumas das Manhãs", a:"André Machado"},
    {t:"Brasil Terra da Esperança", a:"Haroldo S. Mendonça"},
    {t:"Deus Conosco", a:"André Machado"},
    {t:"Dor e Confiança", a:"Allan Filho"},
    {t:"Estrela Matutina", a:"Marielza Tiscate"},
    {t:"Filho de Deus", a:"Allan Filho"},
    {t:"Mar da Vida", a:"Allan Filho"},
    {t:"Na Porta de Damasco", a:"Allan Filho"},
    {t:"Noite e Dia", a:"Allan Filho"},
    {t:"Quando Penso em Jesus", a:"Willi de Barros"},
    {t:"Regeneração", a:"Allan Filho"},
    {t:"São Chegados os Tempos", a:"Clara Gomes"},
    {t:"Sinta", a:"Carol Badon / Caio Diniz / João Mattos / Rafael Concellos"}
  ],
  agitada: [
    {t:"A Canção que a Gente Fez", a:"Projeto Carrocel"},
    {t:"Alvorada Jovem", a:"Gutemberg Paschoal"},
    {t:"Apenas Amar", a:"Denis Soares"},
    {t:"Conquista", a:"Marielza Tiscate"},
    {t:"Confia e Vai", a:"Rafael Concellos"},
    {t:"Daqui Só se Leva o Amor", a:"Jota Quest"},
    {t:"Depende de Você", a:"Ariovaldo Filho"},
    {t:"Diga a Si Mesmo", a:"Autor desconhecido"},
    {t:"Eu-Livre", a:"Denis Soares"},
    {t:"É Preciso Saber Viver", a:"Roberto Carlos / Erasmo Carlos"},
    {t:"Família Universal", a:"Tim e Vanessa"},
    {t:"Força do Bem", a:"Grupo Bem"},
    {t:"Flutuar", a:"Grupo Arte Nascente - GAN"},
    {t:"Já É Tempo", a:"James Ulisses Marotta"},
    {t:"Lei de Amor", a:""},
    {t:"Livro Imortal", a:"Denis Soares"},
    {t:"Novo Rumo", a:"Marcelo Manga"},
    {t:"Nós", a:"Denis Soares"},
    {t:"O Amor de Jesus (Diamantes de Poeira)", a:"Ariovaldo Filho"},
    {t:"O Essencial", a:"Carlos Farias Jr."},
    {t:"Para Sempre em Meu Coração", a:"Willi de Barros"},
    {t:"Pense Já no Amanhã", a:"André Bezerra"},
    {t:"Prá Melhorar", a:"André Pirola"},
    {t:"Segue o Sol", a:"Marcelo Daimom"},
    {t:"Ser Criança", a:"Allan Filho / Carlos Alexandre / Gustavo Novaes"},
    {t:"Sorriso de Esperança", a:"Marielza Tiscate"},
    {t:"Te Encontrei", a:"Carol Badon, Gustavo Garcia e Rafael Concellos"},
    {t:"Voo / Vento e Luz", a:""}
  ]
};

/* ================= SVGs DE FUNDO ================= */
function hillsSVG(opts){
  // opts: {sky1, sky2, hill1, hill2, hill3, celestial}
  return `<svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky-${opts.id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${opts.sky1}"/>
        <stop offset="100%" stop-color="${opts.sky2}"/>
      </linearGradient>
    </defs>
    <rect width="800" height="600" fill="url(#sky-${opts.id})"/>
    ${opts.celestial}
    <g class="drift">
      <path d="M0 380 Q120 320 260 370 T520 350 T800 380 V600 H0 Z" fill="${opts.hill1}" opacity="0.55"/>
    </g>
    <path d="M0 440 Q150 380 320 430 T650 410 T800 440 V600 H0 Z" fill="${opts.hill2}" opacity="0.75"/>
    <path d="M0 500 Q200 460 400 495 T800 500 V600 H0 Z" fill="${opts.hill3}"/>
  </svg>`;
}

function moonScene(){
  return `<g>
    <circle cx="620" cy="120" r="42" fill="#f2e9d6" opacity="0.95"/>
    <circle cx="605" cy="108" r="38" fill="#232c42"/>
    <circle class="twinkle" cx="120" cy="90" r="2" fill="#f2e9d6"/>
    <circle class="twinkle" cx="200" cy="150" r="1.6" fill="#f2e9d6"/>
    <circle class="twinkle" cx="340" cy="70" r="2.2" fill="#f2e9d6"/>
    <circle class="twinkle" cx="480" cy="130" r="1.4" fill="#f2e9d6"/>
    <circle class="twinkle" cx="90" cy="220" r="1.4" fill="#f2e9d6"/>
    <circle class="twinkle" cx="700" cy="230" r="1.8" fill="#f2e9d6"/>
  </g>`;
}
function sunScene(){
  return `<g class="pulse-sun">
    <circle cx="640" cy="150" r="70" fill="#fbe6bf" opacity="0.35"/>
    <circle cx="640" cy="150" r="46" fill="#f6cf8e"/>
    <circle cx="640" cy="150" r="30" fill="#fbe6bf"/>
  </g>`;
}

const BG_LENTA_FULL = hillsSVG({id:'lentaF', sky1:'#1a2135', sky2:'#3d4c6d', hill1:'#4f5f82', hill2:'#33405c', hill3:'#232c42', celestial:moonScene()});
const BG_LENTA_LIST = hillsSVG({id:'lentaL', sky1:'#1c2438', sky2:'#333f5c', hill1:'#4f5f82', hill2:'#2c374f', hill3:'#1e2538', celestial:moonScene()});
const BG_AGIT_FULL = hillsSVG({id:'agitF', sky1:'#3b2a3d', sky2:'#a85f3c', hill1:'#c17b4a', hill2:'#8a4f39', hill3:'#3b2a3d', celestial:sunScene()});
const BG_AGIT_LIST = hillsSVG({id:'agitL', sky1:'#33232f', sky2:'#8d5236', hill1:'#c17b4a', hill2:'#6f4331', hill3:'#2c1f2a', celestial:sunScene()});
const BG_HOME = hillsSVG({id:'home', sky1:'#181722', sky2:'#4a3d52', hill1:'#5c5470', hill2:'#3a3450', hill3:'#211f2c',
  celestial:`<g>
    <circle cx="600" cy="120" r="40" fill="#f2e9d6" opacity="0.9"/>
    <circle cx="586" cy="108" r="36" fill="#211f2c"/>
    <circle class="twinkle" cx="150" cy="90" r="2" fill="#f2e9d6"/>
    <circle class="twinkle" cx="260" cy="150" r="1.6" fill="#f2e9d6"/>
    <circle class="twinkle" cx="380" cy="80" r="2.2" fill="#f2e9d6"/>
    <circle cx="200" cy="180" r="24" fill="#e08a4f" opacity="0.25"/>
  </g>`});

document.getElementById('bg-home').innerHTML = BG_HOME;
document.getElementById('bg-list').innerHTML = BG_LENTA_LIST;
document.getElementById('bg-song').innerHTML = BG_LENTA_FULL;

/* ================= ESTADO / ROTEAMENTO ================= */
let state = { cat:null, filtered:[], songIndex:0 };

document.getElementById('count-lenta').textContent = DATA.lenta.length + ' músicas';
document.getElementById('count-agitada').textContent = DATA.agitada.length + ' músicas';

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop = 0;
  window.scrollTo(0,0);
}

function goHome(){
  state.cat = null;
  showScreen('home');
  location.hash = '#/home';
}

function setListBackground(cat){
  document.getElementById('bg-list').innerHTML = cat==='lenta' ? BG_LENTA_LIST : BG_AGIT_LIST;
  document.getElementById('bg-song').innerHTML = cat==='lenta' ? BG_LENTA_FULL : BG_AGIT_FULL;
}

function goList(cat, filterText){
  state.cat = cat;
  setListBackground(cat);
  document.getElementById('list-title').textContent = cat==='lenta' ? 'Mais lentas' : 'Mais agitadas';
  renderList(filterText || '');
  showScreen('list');
  location.hash = '#/lista/' + cat;
}

function renderList(filterText){
  const all = DATA[state.cat];
  const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q = norm(filterText || '');
  const items = all.filter(s => !q || norm(s.t).includes(q) || norm(s.a).includes(q));
  state.filtered = items;

  document.getElementById('list-count').textContent = items.length + ' de ' + all.length + ' músicas';
  const wrap = document.getElementById('song-list');
  wrap.innerHTML = '';
  if(items.length === 0){
    wrap.innerHTML = '<div class="empty-note">Nenhuma música encontrada.</div>';
    return;
  }
  items.forEach((song) => {
    const idxInAll = all.indexOf(song);
    const btn = document.createElement('button');
    btn.className = 'song-item';
    btn.innerHTML = `<div>
        <div class="song-item-title">${song.t}</div>
        ${song.a ? `<div class="song-item-author">${song.a}</div>` : ''}
      </div>
      <div class="song-item-arrow">›</div>`;
    btn.addEventListener('click', () => goSong(state.cat, idxInAll));
    wrap.appendChild(btn);
  });
}

function goSong(cat, idx){
  state.cat = cat;
  state.songIndex = idx;
  setListBackground(cat);
  renderSong();
  showScreen('song');
  location.hash = '#/musica/' + cat + '/' + idx;
}

function renderSong(){
  const list = DATA[state.cat];
  const song = list[state.songIndex];
  document.getElementById('song-title').textContent = song.t;
  document.getElementById('song-author').textContent = song.a || (state.cat==='lenta' ? 'Mais lentas' : 'Mais agitadas');
  document.getElementById('song-position').textContent = (state.songIndex+1) + ' de ' + list.length;
  document.getElementById('song-prev').disabled = state.songIndex <= 0;
  document.getElementById('song-next').disabled = state.songIndex >= list.length - 1;
}

/* ================= EVENTOS ================= */
document.querySelectorAll('.choice-card').forEach(card=>{
  card.addEventListener('click', ()=> goList(card.dataset.cat));
});
document.getElementById('list-back').addEventListener('click', goHome);
document.getElementById('song-back').addEventListener('click', ()=> goList(state.cat));
document.getElementById('song-home').addEventListener('click', goHome);
document.getElementById('song-prev').addEventListener('click', ()=>{
  if(state.songIndex>0) goSong(state.cat, state.songIndex-1);
});
document.getElementById('song-next').addEventListener('click', ()=>{
  const list = DATA[state.cat];
  if(state.songIndex < list.length-1) goSong(state.cat, state.songIndex+1);
});
document.getElementById('filter-input').addEventListener('input', (e)=> renderList(e.target.value));

document.addEventListener('keydown', (e)=>{
  if(!document.getElementById('song').classList.contains('active')) return;
  if(e.key === 'ArrowLeft') document.getElementById('song-prev').click();
  if(e.key === 'ArrowRight') document.getElementById('song-next').click();
  if(e.key === 'Escape') document.getElementById('song-back').click();
});

/* ================= INÍCIO ================= */
goHome();
</script>
</body>
</html>
